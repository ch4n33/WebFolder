version: '3.8'

services:
  webfolder:
    build: .
    container_name: webfolder
    ports:
      - "3000:3000"
    volumes:
      # NAS 공유 폴더 마운트 (예시)
      - ./uploads:/app/uploads
      # 또는 실제 NAS 경로:
      # - /mnt/nas/shared/webfolder:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SITE_URL=${SITE_URL:-http://localhost:3000}
      - UPLOAD_DIR=/app/uploads
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
    restart: unless-stopped
    # 보안: read-only root filesystem (선택사항)
    # read_only: true
    # tmpfs:
    #   - /tmp
    #   - /var/tmp
