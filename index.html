<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebFolder - 파일 업로드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 인증 섹션 -->
        <div id="auth-section" class="section">
            <h1>WebFolder</h1>
            <div id="qr-container">
                <canvas id="qr-code"></canvas>
            </div>
            <div id="auth-status" class="status-message">인증이 필요합니다</div>
        </div>

        <!-- 업로드 섹션 (인증 후 표시) -->
        <div id="upload-section" class="section hidden">
            <h1>파일 업로드</h1>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <div class="drop-icon">📁</div>
                    <p class="drop-text">파일을 여기에 드래그하거나 클릭하세요</p>
                    <input type="file" id="file-input" multiple accept="image/*,video/*,audio/*">
                </div>
            </div>
            <div id="upload-progress" class="upload-progress hidden">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div id="progress-text" class="progress-text">0%</div>
            </div>
            <div id="upload-status" class="status-message"></div>
            <div id="file-list" class="file-list"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
