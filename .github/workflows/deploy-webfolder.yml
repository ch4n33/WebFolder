name: Deploy WebFolder

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'cluster/apps/webfolder/**'
      - '.github/workflows/deploy-webfolder.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ch4n33/webfolder

jobs:
  build-and-deploy:
    runs-on: [self-hosted, kloud]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Install kubectl
        run: |
          if ! command -v kubectl &> /dev/null; then
            curl -fsSL "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
            chmod +x /usr/local/bin/kubectl
          fi

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Deploy to Kloud
        run: |
          kubectl get deployment webfolder -n kloud-apps 2>/dev/null || \
            kubectl apply -f cluster/apps/webfolder/

          kubectl set image deployment/webfolder \
            webfolder=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n kloud-apps

          kubectl rollout status deployment/webfolder -n kloud-apps --timeout=120s
